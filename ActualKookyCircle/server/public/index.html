<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>RankUp — Level Up Your Game</title>
  <meta name="description" content="The all-in-one social platform for gamers. Play, connect, and rank up.">
  <meta name="theme-color" content="#07070a">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- Google Fonts: Space Grotesk + Inter + JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/app.css">

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%237c3aed'/><text x='50' y='72' font-size='60' text-anchor='middle' fill='white'>↑</text></svg>">
</head>
<body>
  <div id="app">

    <!-- Auth Screen (shown when not logged in) -->
    <div id="auth-screen" class="hidden"></div>

    <!-- App Shell (shown when logged in) -->
    <div id="shell" class="hidden">
      <aside id="sidebar"></aside>
      <div id="page-wrapper">
        <header id="mobile-header"></header>
        <main id="main-content"></main>
      </div>
      <nav id="bottom-nav"></nav>
    </div>

    <!-- Notification Panel -->
    <div id="notif-backdrop" class="hidden"></div>
    <div id="notif-panel" class="notif-panel hidden"></div>

    <!-- Toast Container -->
    <div id="toasts"></div>

    <!-- Modal -->
    <div id="modal-overlay" class="modal-overlay hidden">
      <div id="modal-box" class="modal-box"></div>
    </div>

  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
